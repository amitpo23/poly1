      options:
        max-size: "10m"
        max-file: "5"
    mem_limit: 256m
    cpus: "0.25"
    stop_grace_period: 30s
    profiles: ["btc_daily"]

  position_manager:
    build: .
    image: poly1:local
    container_name: poly1-position-manager
    restart: unless-stopped
    init: true
    env_file:
      - .env
      - deploy/.env.runtime
    environment:
      TZ: UTC
      RUNTIME_AGENT: position_manager
    command: ["python", "-m", "agents.application.position_manager"]
    volumes:
      - ./data:/app/data
      # Mount swarm DB read-write so resolution_sync can write
      # pnl_events when swarm-side markets resolve. Without this, the
      # swarm sub-agents can't be defunded by realized PnL.
      - ${SWARM_DATA_PATH:-/Users/mymac/Desktop/poly/bot/data}:/app/swarm/data
    healthcheck:
      test: ["CMD", "python", "-c",
             "import os, time; assert time.time() - os.path.getmtime('/app/data/position_manager_heartbeat') < 120"]
      interval: 60s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    mem_limit: 256m
    cpus: "0.25"
    stop_grace_period: 30s
    profiles: ["positions"]

  trading-supervisor:
