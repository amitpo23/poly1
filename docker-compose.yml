    init: true
    env_file:
      - .env
      - deploy/.env.runtime
    environment:
      TZ: UTC
      RESOLUTION_SYNC_ENABLED: "${RESOLUTION_SYNC_ENABLED:-true}"
      MAINTAIN_LLM_EXIT_INTERVAL_SEC: "60"
      RUNTIME_AGENT: position_manager
    command: ["python", "-m", "agents.application.position_manager"]
    volumes:
      - ./data:/app/data
      # Mount swarm DB read-write so resolution_sync can write
      # pnl_events when swarm-side markets resolve. Without this, the
      # swarm sub-agents can't be defunded by realized PnL.
      - ${SWARM_DATA_PATH:-/srv/swarm/data}:/app/swarm/data
    healthcheck:
      test: ["CMD", "python", "-c",
             "import os, time; assert time.time() - os.path.getmtime('/app/data/position_manager_heartbeat') < 120"]
      interval: 60s
      timeout: 5s
      retries: 3
