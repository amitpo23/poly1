      # GDELT adds news sentiment; heuristic is the cheap fallback.
      EXTERNAL_CONVICTION_AGGREGATOR_PROVIDERS: "manifold,metaculus,kalshi,tradingview_options,alpaca_market_data,crypto_exchange_tape,technical_signal,clob_whale,gdelt,public_news,heuristic"
