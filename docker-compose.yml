services:
  trader:
    build: .
    image: poly1:local
    container_name: poly1
    restart: unless-stopped
    init: true
    env_file: .env
    environment:
      TZ: UTC
    volumes:
      - ./data:/app/data
      - ./local_db_events:/app/local_db_events
      - ./local_db_markets:/app/local_db_markets
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    mem_limit: 1g
    cpus: "1.0"
    stop_grace_period: 60s

  scalper:
    build: .
    image: poly1:local
    container_name: poly1-scalper
    restart: unless-stopped
    init: true
    env_file: .env
    environment:
      TZ: UTC
    command: ["python", "-m", "agents.application.scalper"]
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c",
             "import os, time; assert time.time() - os.path.getmtime('/app/data/scalper_heartbeat') < 30"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    mem_limit: 512m
    cpus: "0.5"
    stop_grace_period: 30s
    profiles: ["scalper"]

  dashboard:
    build: .
    image: poly1:local
    profiles: ["dashboard"]
    command: >
      streamlit run scripts/python/dashboard.py
      --server.port 8050
      --server.address 0.0.0.0
      --server.headless true
    ports:
      - "8050:8050"
    env_file: .env
    environment:
      TZ: UTC
      SWARM_DB: /swarm/data/swarm.db
    volumes:
      - ./data:/app/data
      - ${SWARM_DATA_PATH:-/Users/mymac/Desktop/poly/bot/data}:/swarm/data:ro
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"

  grafana:
    image: grafana/grafana:10.4.2
    container_name: poly1-grafana
    restart: unless-stopped
    environment:
      GF_INSTALL_PLUGINS: frser-sqlite-datasource
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/poly1.json
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ${SWARM_DATA_PATH:-/Users/mymac/Desktop/poly/bot/data}:/swarm/data
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_storage:/var/lib/grafana
    mem_limit: 256m
    cpus: "0.25"
    profiles: ["monitoring"]

volumes:
  grafana_storage:
