services:
  trader:
    build: .
    image: poly1:local
    container_name: poly1
    restart: unless-stopped
    init: true
    env_file: .env
    environment:
      TZ: UTC
    volumes:
      - ./data:/app/data
      - ./local_db_events:/app/local_db_events
      - ./local_db_markets:/app/local_db_markets
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    mem_limit: 1g
    cpus: "1.0"
    stop_grace_period: 60s

  scalper:
    build: .
    image: poly1:local
    container_name: poly1-scalper
    restart: unless-stopped
    init: true
    env_file: .env
    environment:
      TZ: UTC
    command: ["python", "-m", "agents.application.scalper"]
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c",
             "import os, time; assert time.time() - os.path.getmtime('/app/data/scalper_heartbeat') < 30"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    mem_limit: 512m
    cpus: "0.5"
    stop_grace_period: 30s
    profiles: ["scalper"]

  btc_daily:
    build: .
    image: poly1:local
    container_name: poly1-btc-daily
    restart: unless-stopped
    init: true
    env_file: .env
    environment:
      TZ: UTC
    command: ["python", "-m", "agents.application.btc_daily"]
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c",
             "import os, time; assert time.time() - os.path.getmtime('/app/data/btc_daily_heartbeat') < 60"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    mem_limit: 256m
    cpus: "0.25"
    stop_grace_period: 30s
    profiles: ["btc_daily"]

  position_manager:
    build: .
    image: poly1:local
    container_name: poly1-position-manager
    restart: unless-stopped
    init: true
    env_file: .env
    environment:
      TZ: UTC
    command: ["python", "-m", "agents.application.position_manager"]
    volumes:
      - ./data:/app/data
      # Mount swarm DB read-write so resolution_sync can write
      # pnl_events when swarm-side markets resolve. Without this, the
      # swarm sub-agents can't be defunded by realized PnL.
      - ${SWARM_DATA_PATH:-/Users/mymac/Desktop/poly/bot/data}:/app/swarm/data
    healthcheck:
      test: ["CMD", "python", "-c",
             "import os, time; assert time.time() - os.path.getmtime('/app/data/position_manager_heartbeat') < 120"]
      interval: 60s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    mem_limit: 256m
    cpus: "0.25"
    stop_grace_period: 30s
    profiles: ["positions"]

  dashboard:
    build: .
    image: poly1:local
    profiles: ["dashboard"]
    command: >
      streamlit run scripts/python/dashboard.py
      --server.port 8050
      --server.address 0.0.0.0
      --server.headless true
    ports:
      - "8050:8050"
    env_file: .env
    environment:
      TZ: UTC
      SWARM_DB: /swarm/data/swarm.db
    volumes:
      - ./data:/app/data
      - ${SWARM_DATA_PATH:-/Users/mymac/Desktop/poly/bot/data}:/swarm/data:ro
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8050/_stcore/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"

  allocator-sync:
    build: .
    image: poly1:local
    container_name: poly1-allocator-sync
    restart: unless-stopped
    init: true
    env_file: .env
    environment:
      TZ: UTC
      # Path inside container to the host-mounted poly1 .env file.
      # The daemon reads allocator output and writes these files directly.
      POLY1_ENV_PATH: /app/host/poly1.env
      SWARM_ENV_PATH: /app/host/swarm.env
      POLY1_DB_PATH: /app/data/trade_log.db
      SWARM_DB_PATH: /app/swarm/data/swarm.db
    command: ["python", "scripts/python/allocator_sync.py"]
    volumes:
      - ./data:/app/data
      # poly1/.env mounted read-write so the daemon can update allocations.
      - ./.env:/app/host/poly1.env
      # swarm .env mounted read-write for cross-bot capital sync.
      - ${SWARM_ENV_PATH:-/Users/mymac/Desktop/poly/bot/.env}:/app/host/swarm.env
      # swarm DB read-write for resolution_sync pnl_events writes.
      - ${SWARM_DATA_PATH:-/Users/mymac/Desktop/poly/bot/data}:/app/swarm/data
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    mem_limit: 256m
    cpus: "0.25"
    profiles: ["allocator"]

  near-resolution:
    build: .
    image: poly1:local
    container_name: poly1-near-resolution
    restart: unless-stopped
    init: true
    env_file: .env
    environment:
      TZ: UTC
    command: ["python", "-m", "agents.application.near_resolution"]
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c",
             "import os, time; assert time.time() - os.path.getmtime('/app/data/near_resolution_heartbeat') < 180"]
      interval: 60s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    mem_limit: 256m
    cpus: "0.25"
    stop_grace_period: 30s
    profiles: ["near_resolution"]

  news-shock:
    build: .
    image: poly1:local
    container_name: poly1-news-shock
    restart: unless-stopped
    init: true
    env_file: .env
    environment:
      TZ: UTC
    command: ["python", "-m", "agents.application.news_shock"]
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c",
             "import os, time; assert time.time() - os.path.getmtime('/app/data/news_shock_heartbeat') < 120"]
      interval: 60s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    mem_limit: 256m
    cpus: "0.25"
    stop_grace_period: 30s
    profiles: ["news_shock"]

  news-signal:
    build: .
    image: poly1:local
    container_name: poly1-news-signal
    restart: unless-stopped
    init: true
    env_file: .env
    environment:
      TZ: UTC
      NEWS_SIGNAL_POLL_SEC: "900"
    command: ["python", "-m", "agents.application.news_signal"]
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c",
             "import os, time; assert time.time() - os.path.getmtime('/app/data/news_signal_heartbeat') < 1800"]
      interval: 120s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    mem_limit: 384m
    cpus: "0.50"
    stop_grace_period: 30s
    profiles: ["news_shock"]

  wallet-watcher:
    build: .
    image: poly1:local
    container_name: poly1-wallet-watcher
    restart: unless-stopped
    init: true
    env_file: .env
    environment:
      TZ: UTC
    command: ["python", "-m", "agents.application.wallet_watcher"]
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c",
             "import os, time; assert time.time() - os.path.getmtime('/app/data/wallet_watcher_heartbeat') < 300"]
      interval: 60s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    mem_limit: 256m
    cpus: "0.25"
    stop_grace_period: 30s
    profiles: ["wallet"]

  wallet-follow:
    build: .
    image: poly1:local
    container_name: poly1-wallet-follow
    restart: unless-stopped
    init: true
    env_file: .env
    environment:
      TZ: UTC
    command: ["python", "-m", "agents.application.wallet_follow"]
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c",
             "import os, time; assert time.time() - os.path.getmtime('/app/data/wallet_follow_heartbeat') < 180"]
      interval: 60s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    mem_limit: 256m
    cpus: "0.25"
    stop_grace_period: 30s
    profiles: ["wallet"]

  grafana:
    image: grafana/grafana:10.4.2
    container_name: poly1-grafana
    restart: unless-stopped
    environment:
      GF_INSTALL_PLUGINS: frser-sqlite-datasource
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/poly1.json
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ${SWARM_DATA_PATH:-/Users/mymac/Desktop/poly/bot/data}:/swarm/data
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_storage:/var/lib/grafana
    mem_limit: 256m
    cpus: "0.25"
    profiles: ["monitoring"]

volumes:
  grafana_storage:
