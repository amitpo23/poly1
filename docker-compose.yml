    profiles: ["positions", "settlement"]

  dashboard:
    build: .
    image: poly1:local
    profiles: ["dashboard"]
    command: >
      streamlit run scripts/python/dashboard.py
      --server.port 8050
      --server.address 0.0.0.0
      --server.headless true
    ports:
      - "8050:8050"
    env_file:
      - .env
      - deploy/.env.runtime
    environment:
      TZ: UTC
      SWARM_DB: /swarm/data/swarm.db
      RUNTIME_AGENT: dashboard
    volumes:
      - ./data:/app/data
      - ${SWARM_DATA_PATH:-/Users/mymac/Desktop/poly/bot/data}:/swarm/data:ro
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8050/_stcore/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"

  allocator-sync:
    build: .
    image: poly1:local
    container_name: poly1-allocator-sync
    restart: unless-stopped
    init: true
    env_file:
      - .env
      - deploy/.env.runtime
    environment:
      TZ: UTC
      RUNTIME_AGENT: allocator_sync
      # Path inside container to the host-mounted poly1 .env file.
      # The daemon reads allocator output and writes these files directly.
      POLY1_ENV_PATH: /app/host/poly1.env
      SWARM_ENV_PATH: /app/host/swarm.env
      POLY1_DB_PATH: /app/data/trade_log.db
      SWARM_DB_PATH: /app/swarm/data/swarm.db
    command: ["python", "scripts/python/allocator_sync.py"]
    volumes:
      - ./data:/app/data
      # poly1/.env mounted read-write so the daemon can update allocations.
      - ./.env:/app/host/poly1.env
      # swarm .env mounted read-write for cross-bot capital sync.
      - ${SWARM_ENV_PATH:-/Users/mymac/Desktop/poly/bot/.env}:/app/host/swarm.env
      # swarm DB read-write for resolution_sync pnl_events writes.
      - ${SWARM_DATA_PATH:-/Users/mymac/Desktop/poly/bot/data}:/app/swarm/data
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    mem_limit: 256m
    cpus: "0.25"
    profiles: ["allocator"]

